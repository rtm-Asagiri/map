<script>

const MAP_HEIGHT = 5000;

let tolerance = 3;


function distance(a,b){

    return Math.hypot(
        a.x-b.x,
        a.y-b.y
    );

}



function getNode(nodes,p){


    for(let n of nodes){

        if(distance(n,p)<tolerance){
            return n.id;
        }

    }


    let id="N"+nodes.length;


    nodes.push({

        id:id,

        // x 不變
        x:p.x,

        // SVG座標轉 Leaflet座標
        y:MAP_HEIGHT-p.y

    });


    return id;

}

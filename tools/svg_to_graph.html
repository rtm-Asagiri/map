<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SVG Path → Navigation Graph</title>

<style>
body{
    font-family:sans-serif;
    padding:20px;
}

button{
    padding:10px 20px;
    margin-top:10px;
}

canvas, svg{
    border:1px solid #ccc;
}
</style>

</head>

<body>

<h2>SVG 路徑轉導航節點</h2>

<input type="file" id="file" accept=".svg">

<br>

<button onclick="convert()">
開始轉換
</button>

<p id="status"></p>


<script>


let tolerance = 3; // 節點合併距離


function distance(a,b){

    return Math.hypot(
        a.x-b.x,
        a.y-b.y
    );

}


function getNode(nodes,p){

    for(let n of nodes){

        if(distance(n,p)<tolerance){
            return n.id;
        }

    }


    let id="N"+nodes.length;

    nodes.push({
        id:id,
        x:p.x,
        y:p.y
    });


    return id;

}



function parsePath(d){


    let cmd=[];


    let regex=/([MLHV])([^MLHV]*)/g;

    let m;


    let x=0;
    let y=0;


    let result=[];


    while((m=regex.exec(d))!==null){


        let type=m[1];

        let nums=m[2]
        .trim()
        .split(/[\s,]+/)
        .filter(Boolean)
        .map(Number);


        if(type==="M"){

            x=nums[0];
            y=nums[1];

        }


        else if(type==="L"){


            let nx=nums[0];
            let ny=nums[1];


            result.push([
                {x:x,y:y},
                {x:nx,y:ny}
            ]);


            x=nx;
            y=ny;

        }


        else if(type==="H"){


            let nx=nums[0];


            result.push([
                {x:x,y:y},
                {x:nx,y:y}
            ]);


            x=nx;

        }


        else if(type==="V"){


            let ny=nums[0];


            result.push([
                {x:x,y:y},
                {x:x,y:ny}
            ]);


            y=ny;

        }


    }


    return result;

}




function convert(){


let file=document
.getElementById("file")
.files[0];


if(!file)return;


let reader=new FileReader();


reader.onload=function(){


let text=reader.result;


let parser=new DOMParser();


let svg=parser.parseFromString(
text,
"image/svg+xml"
);


let paths=[
...svg.querySelectorAll("path")
];


let segments=[];


paths.forEach(p=>{

    segments.push(
        ...parsePath(
            p.getAttribute("d")
        )
    );

});



let nodes=[];

let edges=[];



segments.forEach(seg=>{


let a=getNode(
nodes,
seg[0]
);


let b=getNode(
nodes,
seg[1]
);


let len=distance(
seg[0],
seg[1]
);


edges.push({

    from:a,
    to:b,
    distance:
    Number(len.toFixed(2))

});


});



download(
"nodes.json",
JSON.stringify(
nodes,
null,
2
)
);



download(
"edges.json",
JSON.stringify(
edges,
null,
2
)
);



createPreview(nodes,edges);



document.getElementById("status")
.innerHTML=
`
完成<br>
節點:
${nodes.length}<br>
道路:
${edges.length}
`;



}



reader.readAsText(file);



}



function download(name,data){


let blob=new Blob(
[data],
{
type:"application/json"
}
);


let a=document.createElement("a");

a.href=
URL.createObjectURL(blob);

a.download=name;

a.click();

}



function createPreview(nodes,edges){


let svg=`
<svg xmlns="http://www.w3.org/2000/svg"
width="5000"
height="5000"
viewBox="0 0 5000 5000">
`;



edges.forEach(e=>{


let a=
nodes.find(n=>n.id===e.from);

let b=
nodes.find(n=>n.id===e.to);



svg+=`

<line
x1="${a.x}"
y1="${a.y}"
x2="${b.x}"
y2="${b.y}"
stroke="blue"
stroke-width="3"
/>

`;

});



nodes.forEach(n=>{


svg+=`

<circle
cx="${n.x}"
cy="${n.y}"
r="8"
fill="red"
/>

`;

});


svg+="</svg>";



download(
"preview.svg",
svg
);



}



</script>

</body>
</html>
